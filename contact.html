<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - RENATURE</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'DM Sans',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                rgba(0,0,0,0.55),
                rgba(0,0,0,0.55)
            ),
            url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1800&q=80');
            background-size:cover;
            background-position:center;
            color:#fff;
            text-align:center;
            padding:20px;
        }

        .success-card{
            max-width:650px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:24px;
            padding:60px 40px;
            box-shadow:0 20px 50px rgba(0,0,0,0.4);
        }

        .icon{
            font-size:70px;
            margin-bottom:20px;
        }

        h1{
            font-family:'Cormorant Garamond', serif;
            font-size:52px;
            margin-bottom:15px;
        }

        p{
            font-size:17px;
            line-height:1.8;
            color:#ddd;
            margin-bottom:35px;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:#d4af37;
            color:#111;
            padding:16px 35px;
            border-radius:50px;
            font-weight:600;
            transition:0.3s ease;
        }

        .btn:hover{
            transform:translateY(-4px);
        }

        @media(max-width:768px){
            h1{
                font-size:38px;
            }

            .success-card{
                padding:40px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon">✅</div>

        <h1>Thank You!</h1>

        <p>
            Your message has been successfully sent to
            <strong>RENATURE Luxury Cottage</strong>.
            Our concierge team will contact you shortly.
        </p>

        <a href="index.html" class="btn">
            Back To Home
        </a>
    </div>

</body>
</html>
