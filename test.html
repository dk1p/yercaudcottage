<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Houses</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: #f4f4f4;
  padding: 40px;
}

/* CONTAINER */
.container {
  max-width: 1300px;
  margin: auto;
}

/* HEADER */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}

.top h1 {
  font-size: 40px;
}

/* SEARCH */
.search {
  display: flex;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  padding: 8px;
  border-radius: 40px;
}

.search input {
  border: none;
  outline: none;
  padding: 10px;
  background: transparent;
}

.search button {
  background: #1e2a2a;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
}

/* CAROUSEL */
.track {
  display: flex;
  gap: 20px;
  transition: transform 0.6s ease;
}

/* CARD */
.card {
  flex: 0 0 calc(25% - 15px);
  height: 550px;
  border-radius: 24px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: 0.5s ease;
}

/* CURVED CUT */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 70px;
  height: 70px;
  background: #f4f4f4;
  border-bottom-left-radius: 100%;
  z-index: 2;
}

/* IMAGE */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CORNER BUTTON */
.corner-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 34px;
  height: 34px;
  background: black;
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3;
  cursor: pointer;
}

/* OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  padding: 20px;
  color: white;
  width: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

.overlay h3 {
  font-size: 18px;
}

.overlay p {
  font-size: 12px;
  opacity: 0.8;
}

/* BUTTON */
.book {
  margin-top: 10px;
  display: none;
  background: white;
  color: black;
  border: none;
  padding: 6px 14px;
  border-radius: 20px;
}

/* HOVER EFFECT */
.track:hover .card {
  transform: scale(0.9);
}

.track .card:hover {
  transform: scale(1);
  z-index: 2;
}

.card:hover .book {
  display: inline-block;
}

/* ACTIVE SEARCH */
.card.active {
  transform: scale(1.3) !important;
  z-index: 3;
}

.card.active .book {
  display: inline-block;
}

/* RESPONSIVE */

/* TABLET */
@media (max-width: 1024px) {
  .card {
    flex: 0 0 calc(33.33% - 15px);
    height: 450px;
  }
}

/* MOBILE */
@media (max-width: 768px) {
  .top {
    flex-direction: column;
    align-items: center;   /* center everything */
    text-align: center;
    gap: 20px;
  }
   
  .search {
    justify-content: center; /* center input + button */
    width: 100%;
    max-width: 350px;
  }

  .top h1 {
    font-size: 28px;
  }

  .card {
    flex: 0 0 calc(50% - 10px);
    height: 380px;
  }
}

/* SMALL MOBILE */
@media (max-width: 480px) {
  body {
    padding: 20px;
  }

  .card {
    flex: 0 0 100%;
    height: 300px;
  }

  .search {
    width: 100%;
    justify-content: center;
  }

  .search input {
    flex: 1;
    text-align: center;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="top">
    <h1>Choose a house<br>that speaks to you</h1>

    <div class="search">
      <input id="searchInput" placeholder="Location">
      <button onclick="search()">Search</button>
    </div>
  </div>

  <div class="carousel">
    <div class="track" id="track">

      <div class="card" data-location="forest">
        <div class="corner-btn">↗</div>
        <img src="https://images.unsplash.com/photo-1518780664697-55e3ad937233?auto=format&fit=crop&q=80&w=800">
        <div class="overlay">
          <h3>Forest Harmony</h3>
          <p>Nature silence retreat</p>
          <button class="book">Book now</button>
        </div>
      </div>

      <div class="card" data-location="mountain">
        <div class="corner-btn">↗</div>
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=800">
        <div class="overlay">
          <h3>Panorama Rise</h3>
          <p>Unforgettable view</p>
          <button class="book">Book now</button>
        </div>
      </div>

      <div class="card" data-location="romantic">
        <div class="corner-btn">↗</div>
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&q=80&w=800">
        <div class="overlay">
          <h3>Romantic Bloom</h3>
          <p>Perfect for couples</p>
          <button class="book">Book now</button>
        </div>
      </div>

      <div class="card" data-location="wild">
        <div class="corner-btn">↗</div>
        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&q=80&w=800">
        <div class="overlay">
          <h3>Wild Soul</h3>
          <p>Freedom lifestyle</p>
          <button class="book">Book now</button>
        </div>
      </div>

      <div class="card" data-location="zen">
        <div class="corner-btn">↗</div>
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e">
        <div class="overlay">
          <h3>Zen Retreat</h3>
          <p>Peace & calm</p>
          <button class="book">Book now</button>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
const track = document.getElementById("track");
let cards = Array.from(track.children);
let index = 0;

let autoSlide;

/* RESPONSIVE CARD COUNT */
function getVisibleCards() {
  if (window.innerWidth <= 480) return 1;
  if (window.innerWidth <= 768) return 2;
  if (window.innerWidth <= 1024) return 3;
  return 4;
}

let visibleCards = getVisibleCards();

/* CLONE FOR LOOP */
cards.slice(0, visibleCards).forEach(card => {
  let clone = card.cloneNode(true);
  track.appendChild(clone);
});

let totalCards = track.children.length;

/* GET WIDTH */
function getCardWidth() {
  return track.children[0].offsetWidth + 20;
}

/* SLIDE */
function slide() {
  index++;
  let cardWidth = getCardWidth();

  track.style.transition = "transform 0.6s ease";
  track.style.transform = `translateX(-${index * cardWidth}px)`;

  if (index >= totalCards - visibleCards) {
    setTimeout(() => {
      track.style.transition = "none";
      index = 0;
      track.style.transform = `translateX(0px)`;
    }, 600);
  }
}

/* AUTO SLIDE CONTROL */
function startAutoSlide() {
  autoSlide = setInterval(slide, 3000);
}

function stopAutoSlide() {
  clearInterval(autoSlide);
}

/* HOVER PAUSE */
track.addEventListener("mouseenter", stopAutoSlide);
track.addEventListener("mouseleave", startAutoSlide);

/* RESIZE FIX */
window.addEventListener("resize", () => {
  visibleCards = getVisibleCards();
});

/* INIT */
startAutoSlide();

/* SEARCH */
function search() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let allCards = Array.from(track.children);

  let found = null;

  allCards.forEach(card => {
    card.classList.remove("active");
    if (card.dataset.location.includes(input) && input !== "") {
      found = card;
    }
  });

  if (found) {
    found.classList.add("active");
    track.prepend(found);
    index = 0;
    track.style.transform = `translateX(0px)`;
  }
}
</script>

</body>
</html>
